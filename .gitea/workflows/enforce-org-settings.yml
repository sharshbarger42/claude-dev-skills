name: Enforce Org Settings

# Triggers:
#   1. Weekly cron on Sunday at 09:00 UTC — full org scan + auto-fix
#   2. Manual dispatch — optionally scoped to a single repo or dry-run
#   3. Repository event (new repo created) — enforces on the new repo only

on:
  schedule:
    - cron: "0 9 * * 0"  # Every Sunday at 09:00 UTC

  workflow_dispatch:
    inputs:
      repo:
        description: "Single repo name to enforce (leave empty for all org repos)"
        required: false
        default: ""
      dry_run:
        description: "Dry run — show what would change without making changes (true/false)"
        required: false
        default: "false"

  # NOTE: This trigger fires for events on the *development-skills* repo itself,
  # not for new repo creation in the org. Gitea dispatches org-level repository
  # events to org webhooks, not to workflow files in sibling repos. New repos are
  # therefore caught on the next weekly Sunday scan (cron above).
  # To enforce on new repos immediately, configure an org-level webhook that calls:
  #   POST /api/v1/repos/super-werewolves/development-skills/actions/workflows/enforce-org-settings.yml/dispatches
  repository:
    types:
      - created

jobs:
  enforce:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout development-skills
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx

      - name: Run org settings enforcer
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          REPO_NAME: ${{ github.event.repository.name }}
          INPUT_REPO: ${{ github.event.inputs.repo }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          ARGS=()

          # Scope to the newly created repo when triggered by repository.created
          if [ "$EVENT_NAME" = "repository" ]; then
            echo "New repo created: $REPO_NAME — enforcing on it only"
            ARGS+=(--repo "$REPO_NAME")
          fi

          # workflow_dispatch overrides
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -n "$INPUT_REPO" ]; then
              ARGS+=(--repo "$INPUT_REPO")
            fi
            if [ "$INPUT_DRY_RUN" = "true" ]; then
              ARGS+=(--dry-run)
            fi
          fi

          python scripts/enforce-org-settings.py "${ARGS[@]}"
